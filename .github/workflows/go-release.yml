name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Run tests
        run: go test -race ./...

  validate-plugin:
    name: Validate Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate plugin manifests
        run: |
          # Validate marketplace.json and plugin.json
          # This requires claude CLI to be available
          if command -v claude &> /dev/null; then
            claude plugin validate . --strict
          else
            echo "⚠ claude CLI not available, skipping plugin validation"
            echo "Run 'claude plugin validate . --strict' locally before releasing"
          fi

  goreleaser:
    name: Release
    needs: [test, validate-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.5'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
